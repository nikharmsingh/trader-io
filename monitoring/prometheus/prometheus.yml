global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trader-io'

rule_files: []

scrape_configs:

  # ── FastAPI ──────────────────────────────────────────────────────────────
  - job_name: 'trader-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  # ── Kafka Producer (ingestion) ────────────────────────────────────────────
  - job_name: 'trader-ingestion'
    static_configs:
      - targets: ['ingestion:8001']
    metrics_path: /metrics

  # ── Kafka Exporter ────────────────────────────────────────────────────────
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # ── Node Exporter ─────────────────────────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ── Prometheus itself ─────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
