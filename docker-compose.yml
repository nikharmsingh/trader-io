x-common-env: &common-env
  env_file: .env
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-trader_io_secret_2024}
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123}
  CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-trader_io}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}

networks:
  trader-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  minio-data:
  clickhouse-data:
  airflow-logs:
  postgres-airflow-data:

services:

  # ─────────────────────────────
  #  ZOOKEEPER
  # ─────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: trader-zookeeper
    <<: *common-env
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - trader-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  #  KAFKA
  # ─────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trader-kafka
    <<: *common-env
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - trader-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────
  #  KAFKA UI
  # ─────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trader-kafka-ui
    <<: *common-env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: trader-io
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - trader-net

  # ─────────────────────────────
  #  KAFKA INIT (topic creation)
  # ─────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trader-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - trader-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cub kafka-ready -b kafka:9092 1 30
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --topic raw.trades
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --topic processed.candles
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --topic processed.indicators
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic alerts
        echo 'Kafka topics ready.'
        kafka-topics --list --bootstrap-server kafka:9092
    restart: on-failure

  # ─────────────────────────────
  #  MINIO
  # ─────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: trader-minio
    <<: *common-env
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - trader-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9000' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: trader-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - trader-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123}
        mc mb local/raw-market-data --ignore-existing
        mc mb local/processed-market-data --ignore-existing
        echo 'MinIO buckets created.'
    restart: on-failure

  # ─────────────────────────────
  #  CLICKHOUSE
  # ─────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: trader-clickhouse
    <<: *common-env
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./storage/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - trader-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────
  #  POSTGRES (Airflow backend)
  # ─────────────────────────────
  postgres-airflow:
    image: postgres:15-alpine
    container_name: trader-postgres-airflow
    <<: *common-env
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    networks:
      - trader-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  #  AIRFLOW — DB Init
  # ─────────────────────────────
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: trader-airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *airflow-env
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname Trader --lastname IO --role Admin \
          --email admin@trader.io || true
        echo 'Airflow init complete.'
    networks:
      - trader-net
    restart: on-failure

  # ─────────────────────────────
  #  AIRFLOW — Webserver
  # ─────────────────────────────
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: trader-airflow-webserver
    <<: *common-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
    command: webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
    networks:
      - trader-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────
  #  AIRFLOW — Scheduler
  # ─────────────────────────────
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: trader-airflow-scheduler
    <<: *common-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
    networks:
      - trader-net

  # ─────────────────────────────
  #  INGESTION (Kafka Producer)
  # ─────────────────────────────
  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: trader-ingestion
    <<: *common-env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATA_SOURCE: ${DATA_SOURCE:-mock}
      SYMBOLS: ${SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,ADAUSDT}
      MOCK_TICK_INTERVAL_MS: ${MOCK_TICK_INTERVAL_MS:-500}
      BINANCE_WS_URL: ${BINANCE_WS_URL:-wss://stream.binance.com:9443/ws}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - trader-net

  # ─────────────────────────────
  #  SPARK STREAMING (Processing)
  # ─────────────────────────────
  spark-processor:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: trader-spark
    <<: *common-env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-trader_io}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "4040:4040"   # Spark Streaming UI
    networks:
      - trader-net

  # ─────────────────────────────
  #  API (FastAPI)
  # ─────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: trader-api
    <<: *common-env
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-trader_io}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8501}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - trader-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  #  DASHBOARD (Streamlit)
  # ─────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: trader-dashboard
    <<: *common-env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      DASHBOARD_REFRESH_INTERVAL: ${DASHBOARD_REFRESH_INTERVAL:-5}
    networks:
      - trader-net

  # ─────────────────────────────
  #  ALERTING ENGINE
  # ─────────────────────────────
  alerting:
    build:
      context: ./alerting
      dockerfile: Dockerfile
    container_name: trader-alerting
    <<: *common-env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_INDICATORS: processed.indicators
      KAFKA_TOPIC_ALERTS: alerts
      ALERT_RSI_OVERBOUGHT: ${ALERT_RSI_OVERBOUGHT:-70}
      ALERT_RSI_OVERSOLD: ${ALERT_RSI_OVERSOLD:-30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - trader-net
